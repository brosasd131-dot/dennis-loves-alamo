<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funny Pop-Up</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: black;
    height: 100vh;
    width: 100vw;
    position: relative;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-family: Arial, sans-serif;
    font-size: 2em;
    user-select: none;
  }
  #click-text {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none; /* so clicks go to body */
  }
  #alamo {
    position: absolute;
    width: 60vw; /* bigger PNG */
    max-width: 900px;
    top: 50%;
    left: -1000px; /* hidden offscreen */
    transform: translateY(-50%);
    transition: none;
  }
  .shake {
    animation: shake 0.6s;
  }
  @keyframes shake {
    0% { transform: translate(-10px, -10px) rotate(-10deg); }
    25% { transform: translate(10px, 10px) rotate(10deg); }
    50% { transform: translate(-10px, 10px) rotate(-10deg); }
    75% { transform: translate(10px, -10px) rotate(10deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
  }
</style>
</head>
<body>

<div id="click-text">CLICK HERE</div>
<img src="Alamo.png" id="alamo" alt="Alamo">
<audio id="scream" src="All alamos _jonmud _jon mud(MP3).mp3"></audio>

<script>
const alamo = document.getElementById('alamo');
const screamAudio = document.getElementById('scream');

function popAlamo() {
  // Hide click text while PNG pops
  document.getElementById('click-text').style.display = 'none';

  // Center the PNG
  alamo.style.left = (window.innerWidth/2 - alamo.offsetWidth/2) + 'px';
  alamo.classList.add('shake');

  // Play MP3
  screamAudio.currentTime = 0;
  screamAudio.play();

  // Hide PNG after 0.8s and show click text again
  setTimeout(() => {
    alamo.classList.remove('shake');
    alamo.style.left = '-1000px';
    document.getElementById('click-text').style.display = 'block';
  }, 800);
}

// Pop when user clicks anywhere
document.body.addEventListener('click', popAlamo);
</script>

</body>
</html>
